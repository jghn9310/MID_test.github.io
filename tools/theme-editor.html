<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>디자인 편집기 · MID Lab</title>
  <!-- 로컬 전용 디자인 도구. 인증 기능이 아니며 production dist에서 제외한다. -->
  <style>
    :root {
      --paper: #ffffff;
      --paper-soft: #fcfdfc;
      --paper-deep: #f2f4f3;
      --graphite: #202320;
      --charcoal: #393d39;
      --muted: #6b726a;
      --line: #dde1db;
      --line-strong: #b8beb6;
      --steel: #59615b;
      --font-sans: "Inter", "Aptos", "Segoe UI", Arial, sans-serif;
      --font-korean: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      --font-mono: "Cascadia Mono", "Consolas", monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      grid-template-columns: minmax(340px, 420px) 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas: "topbar topbar" "controls preview";
      height: 100vh;
      color: var(--graphite);
      background: var(--paper);
      font-family: var(--font-korean), var(--font-sans);
      font-size: 14px;
    }

    /* ── Top bar ── */
    .topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--paper-soft);
    }
    .topbar h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.01em;
    }
    .topbar .hint { color: var(--muted); font-size: 12px; }
    .topbar .spacer { flex: 1; }
    .btn {
      appearance: none;
      font: inherit;
      font-size: 13px;
      font-weight: 550;
      color: var(--graphite);
      background: var(--paper);
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease;
    }
    .btn:hover { background: var(--paper-deep); }
    .btn.primary {
      color: #fff;
      background: var(--graphite);
      border-color: var(--graphite);
    }
    .btn.primary:hover { background: #000; }
    .btn.ghost { border-color: transparent; color: var(--muted); }
    .btn.ghost:hover { color: var(--graphite); background: var(--paper-deep); }

    /* ── Controls ── */
    .controls {
      grid-area: controls;
      overflow-y: auto;
      padding: 8px 18px 60px;
      border-right: 1px solid var(--line);
    }
    .group { border-bottom: 1px solid var(--line); }
    .group > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 4px;
      font-weight: 650;
      font-size: 13px;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group > summary::-webkit-details-marker { display: none; }
    .group > summary::before {
      content: "▸";
      color: var(--muted);
      font-size: 11px;
      transition: transform 140ms ease;
    }
    .group[open] > summary::before { transform: rotate(90deg); }
    .group .group-body { padding: 2px 4px 16px; }

    .row { padding: 11px 0; border-top: 1px dashed var(--line); }
    .row:first-child { border-top: 0; }
    .row .label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .row .label .name { font-weight: 550; font-size: 13px; }
    .row .label .token { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); }
    .row .readout {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--steel);
      min-width: 58px;
      text-align: right;
    }
    .slider-line { display: flex; align-items: center; gap: 10px; }
    input[type="range"] { flex: 1; accent-color: var(--graphite); height: 20px; }
    input[type="color"] {
      width: 40px; height: 28px; padding: 0;
      border: 1px solid var(--line-strong); border-radius: 6px; background: none; cursor: pointer;
    }
    input[type="text"] {
      width: 100%; font: inherit; font-family: var(--font-mono); font-size: 12px;
      padding: 7px 9px; color: var(--graphite);
      border: 1px solid var(--line-strong); border-radius: 6px; background: var(--paper);
    }
    .row.changed .name::after {
      content: "· 변경됨";
      color: var(--steel);
      font-weight: 500;
      font-size: 11px;
      margin-left: 6px;
    }
    .color-line { display: flex; align-items: center; gap: 10px; }
    .color-line .swatch-val { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

    /* ── Preview ── */
    .preview { grid-area: preview; display: flex; flex-direction: column; min-width: 0; }
    .preview-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; border-bottom: 1px solid var(--line); background: var(--paper-soft);
    }
    .preview-bar select {
      font: inherit; font-size: 13px; padding: 6px 10px;
      border: 1px solid var(--line-strong); border-radius: 6px; background: var(--paper); color: var(--graphite);
    }
    .preview-bar .label { color: var(--muted); font-size: 12px; }
    .preview-bar .pv-spacer { flex: 1; }
    .preview-frame-wrap { flex: 1; position: relative; background: var(--paper-deep); overflow: hidden; }
    iframe {
      position: absolute; top: 0; left: 0; border: 0; background: #fff;
      transform-origin: top left; box-shadow: 0 0 0 1px var(--line);
    }

    /* ── Export modal ── */
    .modal-back {
      position: fixed; inset: 0; background: rgba(20,23,20,0.42);
      display: none; align-items: center; justify-content: center; padding: 24px; z-index: 50;
    }
    .modal-back.open { display: flex; }
    .modal {
      width: min(760px, 100%); max-height: 86vh; display: flex; flex-direction: column;
      background: var(--paper); border-radius: 12px; overflow: hidden;
      box-shadow: 0 24px 60px rgba(20,23,20,0.24);
    }
    .modal header { padding: 18px 22px 12px; border-bottom: 1px solid var(--line); }
    .modal header h2 { margin: 0 0 4px; font-size: 16px; }
    .modal header p { margin: 0; color: var(--muted); font-size: 12.5px; line-height: 1.5; }
    .modal .steps { margin: 8px 0 0; padding-left: 18px; color: var(--charcoal); font-size: 12.5px; line-height: 1.7; }
    .modal .steps code { font-family: var(--font-mono); background: var(--paper-deep); padding: 1px 5px; border-radius: 4px; }
    .modal textarea {
      flex: 1; margin: 0; border: 0; border-top: 1px solid var(--line);
      font-family: var(--font-mono); font-size: 12px; line-height: 1.55;
      padding: 16px 22px; resize: none; color: var(--graphite); background: var(--paper-soft);
    }
    .modal footer { display: flex; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--line); }
    .modal footer .spacer { flex: 1; }
    .toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--graphite); color: #fff; padding: 10px 18px; border-radius: 8px;
      font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 180ms ease, transform 180ms ease; z-index: 60;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .empty { padding: 40px 8px; color: var(--muted); font-size: 13px; line-height: 1.6; }

    /* ── Master (위계별 일괄) group ── */
    .group.master { border: 1px solid var(--line-strong); border-radius: 10px; margin: 10px 0 14px; background: var(--paper-deep); }
    .group.master > summary { font-size: 13.5px; font-weight: 700; color: var(--graphite); }
    .group.master > summary::before { color: var(--steel); }
    .group.master .group-body { padding: 2px 10px 14px; }
    .group.master .master-caption { color: var(--muted); font-size: 11.5px; line-height: 1.5; padding: 0 0 6px; }
    .master-reset { margin-left: auto; font-size: 11px; color: var(--muted); background: none; border: 0; cursor: pointer; text-decoration: underline; }
    .master-reset:hover { color: var(--graphite); }

    /* ── Locked rows ── */
    .row.locked { opacity: 0.55; }
    .row.locked .name { color: var(--muted); }
    .row.locked .lock-tag { font-weight: 500; font-size: 10.5px; color: var(--muted); margin-left: 6px; }
    .row.locked .lock-val { font-family: var(--font-mono); font-size: 11.5px; color: var(--muted); padding: 4px 0; word-break: break-all; }
    input:disabled, input[type="color"]:disabled { cursor: not-allowed; opacity: 0.5; }

    /* ── 항목별 초기화 버튼 ── */
    .reset-btn {
      appearance: none; border: 0; background: none; cursor: pointer;
      color: var(--muted); font-size: 13px; line-height: 1; padding: 3px 5px;
      border-radius: 5px; flex: none; opacity: 0; transition: opacity 120ms ease, color 120ms ease;
    }
    .row:hover .reset-btn, .master-row:hover .reset-btn, .reset-btn:focus-visible { opacity: 1; }
    .row.changed .reset-btn { opacity: 0.6; }
    .reset-btn:hover { color: var(--graphite); background: var(--line); opacity: 1; }
    .reset-btn:active { transform: translateY(1px); }
</style>
</head>
<body>
  <div class="topbar">
    <h1>디자인 편집기</h1>
    <span class="hint">영역별 글씨 크기·색을 조절하고 &lt;내보내기&gt;로 저장</span>
    <span class="spacer"></span>
    <button class="btn ghost" id="btn-reset">전체 초기화</button>
    <button class="btn primary" id="btn-export">내보내기</button>
  </div>

  <div class="controls" id="controls">
    <div class="empty">theme.css 를 불러오는 중…</div>
  </div>

  <div class="preview">
    <div class="preview-bar">
      <span class="label">미리보기</span>
      <select id="page-select">
        <option value="../index.html">홈 (index)</option>
        <option value="../research/materials-design.html">연구 — Materials Design</option>
        <option value="../research/calphad.html">연구 — CALPHAD</option>
        <option value="../publications.html">Publications</option>
        <option value="../people/students.html">Team — Students</option>
        <option value="../people/principal-advisor.html">Team — PI</option>
        <option value="../board/gallery.html">Board — Gallery</option>
        <option value="../board/news.html">Board — News</option>
        <option value="../contact.html">Contact</option>
      </select>
      <span class="pv-spacer"></span>
      <span class="label">화면폭</span>
      <select id="width-select">
        <option value="auto">내 화면 폭 (실제)</option>
        <option value="1920">와이드 1920</option>
        <option value="1440">데스크톱 1440</option>
        <option value="1280">노트북 1280</option>
        <option value="834">태블릿 834</option>
        <option value="390">모바일 390</option>
      </select>
      <span class="label" id="scale-note"></span>
    </div>
    <div class="preview-frame-wrap">
      <iframe id="preview" src="../index.html" title="사이트 미리보기"></iframe>
    </div>
  </div>

  <div class="modal-back" id="modal-back">
    <div class="modal">
      <header>
        <h2>theme.css 내보내기</h2>
        <p>아래 내용은 바꾼 값이 반영된 <strong>theme.css 전체</strong>입니다(주석·라벨 그대로 유지).</p>
        <ol class="steps">
          <li>아래 <b>&lt;전체 복사&gt;</b> 버튼을 누르세요.</li>
          <li><code>site/assets/css/theme.css</code> 파일을 열고 <b>전체를 지운 뒤 붙여넣기</b> 하세요.</li>
          <li>저장하고 평소처럼 배포(push)하면 사이트 전체에 반영됩니다.</li>
        </ol>
      </header>
      <textarea id="export-text" spellcheck="false" readonly></textarea>
      <footer>
        <button class="btn primary" id="btn-copy">전체 복사</button>
        <span class="spacer"></span>
        <button class="btn" id="btn-download">파일로 저장</button>
        <button class="btn ghost" id="btn-close">닫기</button>
      </footer>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    "use strict";
    var THEME_URL = "../assets/css/theme.css";
    var LS_KEY = "mid-theme-edits-v1";
    var LS_PAGE = "mid-theme-preview-page";
    var LS_MASTER = "mid-theme-masters-v1";

    var rawText = "";
    var tokens = [];      // { name, value, label, section, type }
    var edits = {};       // name -> { factor } for size, { hex } for color, { text } for advanced
    var masters = {};     // tier key -> factor (위계별 일괄 배율)
    var sections = [];    // ordered [{ title, items:[token] }]
    var sizeReadouts = {}; // token name -> readout element (for master refresh)

    // 편집하면 디자인/기능이 깨지기 쉬운 항목 — 잠금(편집 불가)
    var LOCKED = {
      "--font-sans": 1, "--font-korean": 1, "--font-serif": 1, "--font-mono": 1,
      "--ease-out": 1, "--hero-min": 1, "--paper": 1, "--focus": 1
    };

    // 위계(크기 등급) — 같은 등급을 한꺼번에 조절하는 마스터 슬라이더용
    var TIERS = [
      { key: "display", label: "아주 큰 제목", hint: "히어로·페이지 대표 제목" },
      { key: "heading", label: "제목·소제목", hint: "섹션 제목, 항목 제목" },
      { key: "body",    label: "본문·설명",   hint: "일반 문단, 설명글" },
      { key: "label",   label: "작은 라벨·태그", hint: "꼬리표, 메타, 캡션" },
      { key: "nav",     label: "네비게이션",  hint: "상단·서브 메뉴 링크" }
    ];
    var TIER_LABEL = {}; TIERS.forEach(function (t) { TIER_LABEL[t.key] = t.label; });

    var $ = function (id) { return document.getElementById(id); };

    // ---- load persisted state ----
    try { edits = JSON.parse(localStorage.getItem(LS_KEY) || "{}") || {}; } catch (e) { edits = {}; }
    try { masters = JSON.parse(localStorage.getItem(LS_MASTER) || "{}") || {}; } catch (e) { masters = {}; }

    function saveEdits() {
      try { localStorage.setItem(LS_KEY, JSON.stringify(edits)); } catch (e) {}
    }
    function saveMasters() {
      try { localStorage.setItem(LS_MASTER, JSON.stringify(masters)); } catch (e) {}
    }

    // 사이즈 토큰이 속한 위계(티어) 판별. 네비는 이름으로, 나머지는 최대 rem 크기로.
    function tierOf(t) {
      if (t.type !== "size" || LOCKED[t.name]) return null;
      if (/^--fs-(nav|subnav)/.test(t.name)) return "nav";
      var max = 0;
      (t.value.match(/([\d.]+)rem/g) || []).forEach(function (s) {
        var v = parseFloat(s); if (v > max) max = v;
      });
      if (!max) { var px = (t.value.match(/([\d.]+)px/) || [])[1]; if (px) max = parseFloat(px) / 16; }
      if (max >= 2.0) return "display";
      if (max >= 1.15) return "heading";
      if (max >= 0.86) return "body";
      return "label";
    }
    function masterF(t) { var k = tierOf(t); return (k && masters[k]) ? masters[k] : 1; }
    function indivF(t) { return (edits[t.name] && edits[t.name].factor) || 1; }
    function effF(t) { return indivF(t) * masterF(t); }

    // ---- parse theme.css ----
    function classify(name, value) {
      if (/^#[0-9a-fA-F]{3,8}$/.test(value.trim())) return "color";
      if (name.indexOf("--fs-") === 0) return "size";
      if (name.indexOf("--font") === 0) return "font";
      return "advanced";
    }

    function parseTheme(text) {
      var lines = text.split("\n");
      var curSection = "기타";
      var secMap = {};
      var order = [];
      var reSec = /\/\*\s*──\s*(.+?)\s*─/;         // section header
      var reTok = /^\s*(--[\w-]+)\s*:\s*([^;]+);(?:\s*\/\*\s*(.*?)\s*\*\/)?/;
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var ms = line.match(reSec);
        if (ms) { curSection = ms[1].trim(); continue; }
        var mt = line.match(reTok);
        if (mt) {
          var t = {
            name: mt[1],
            value: mt[2].trim(),
            label: (mt[3] || "").trim(),
            section: curSection
          };
          t.type = classify(t.name, t.value);
          tokens.push(t);
          if (!secMap[curSection]) { secMap[curSection] = { title: curSection, items: [] }; order.push(secMap[curSection]); }
          secMap[curSection].items.push(t);
        }
      }
      sections = order;
    }

    // ---- value helpers ----
    function scaleValue(value, factor) {
      return value.replace(/(-?[\d.]+)(rem|em|px|vw|vh|%)/g, function (m, n, u) {
        var v = Math.round(parseFloat(n) * factor * 1000) / 1000;
        return v + u;
      });
    }
    function currentValue(t) {
      if (t.type === "size") return scaleValue(t.value, effF(t));
      var e = edits[t.name];
      if (!e) return t.value;
      if (t.type === "color") return e.hex || t.value;
      return (e.text != null) ? e.text : t.value;
    }
    function isChanged(t) {
      if (LOCKED[t.name]) return false;
      if (t.type === "size") return Math.abs(effF(t) - 1) > 0.0001;
      var e = edits[t.name];
      if (!e) return false;
      if (t.type === "color") return (e.hex || t.value).toLowerCase() !== t.value.toLowerCase();
      return e.text != null && e.text !== t.value;
    }

    // ---- build controls ----
    function el(tag, cls, txt) {
      var n = document.createElement(tag);
      if (cls) n.className = cls;
      if (txt != null) n.textContent = txt;
      return n;
    }

    function buildControls() {
      var root = $("controls");
      root.innerHTML = "";
      sizeReadouts = {};
      root.appendChild(buildMasterGroup());
      sections.forEach(function (sec, si) {
        // 편집기에는 조절 가능한 항목만 표시 — 색(color)과 잠긴 항목(글꼴·모션·레이아웃 등)은 제외
        var items = sec.items.filter(function (t) { return t.type !== "color" && !LOCKED[t.name]; });
        if (!items.length) return; // 남는 게 없는 섹션(색·글꼴·모션 등)은 통째로 숨김
        var det = el("details", "group");
        // open the size-related groups by default
        if (/글씨|홈/.test(sec.title) && si < 6) det.open = true;
        var sum = el("summary", null, sec.title);
        det.appendChild(sum);
        var body = el("div", "group-body");
        items.forEach(function (t) { body.appendChild(buildRow(t)); });
        det.appendChild(body);
        root.appendChild(det);
      });
    }

    // 위계별 일괄 조절 — 같은 크기 등급을 한 슬라이더로 전 페이지 동시에
    function buildMasterGroup() {
      var det = el("details", "group master");
      det.open = true;
      var sum = el("summary", null, "위계별 일괄 조절 (전 페이지 공통)");
      det.appendChild(sum);
      var body = el("div", "group-body");
      var cap = el("div", "master-caption",
        "같은 크기 등급을 한 번에 키우거나 줄입니다. 개별 항목은 아래에서 따로 미세조정할 수 있어요(개별 × 일괄).");
      body.appendChild(cap);
      TIERS.forEach(function (tier) {
        body.appendChild(buildMasterRow(tier));
      });
      det.appendChild(body);
      return det;
    }

    function buildMasterRow(tier) {
      var row = el("div", "row");
      var label = el("div", "label");
      var name = el("span", "name", tier.label);
      var read = el("span", "readout", pct(masters[tier.key] || 1));
      label.appendChild(name);
      label.appendChild(read);
      row.appendChild(label);
      var cap = el("div", "master-caption", tier.hint);
      cap.style.padding = "0 0 6px";
      row.appendChild(cap);
      var line = el("div", "slider-line");
      var range = document.createElement("input");
      range.type = "range";
      range.min = "0.6"; range.max = "1.6"; range.step = "0.01";
      range.value = String(masters[tier.key] || 1);
      range.addEventListener("input", function () {
        masters[tier.key] = parseFloat(range.value);
        read.textContent = pct(range.value);
        saveMasters();
        applyLive();
        refreshSizeRows();
      });
      var reset = el("button", "reset-btn", "↺");
      reset.type = "button";
      reset.title = "이 등급만 기본값으로";
      reset.addEventListener("click", function () {
        if (masters[tier.key]) { delete masters[tier.key]; saveMasters(); }
        range.value = "1";
        read.textContent = pct(1);
        applyLive();
        refreshSizeRows();
      });
      line.appendChild(range);
      line.appendChild(read);
      line.appendChild(reset);
      row.appendChild(line);
      return row;
    }

    // 마스터가 바뀌면 영향을 받는 개별 사이즈 행들의 표시(순 배율%·변경표시)를 갱신
    function refreshSizeRows() {
      tokens.forEach(function (t) {
        if (t.type !== "size" || LOCKED[t.name]) return;
        var read = sizeReadouts[t.name];
        if (read) read.textContent = pct(effF(t));
        var row = document.querySelector('.row[data-name="' + t.name + '"]');
        if (row) { if (isChanged(t)) row.classList.add("changed"); else row.classList.remove("changed"); }
      });
    }

    function buildRow(t) {
      var row = el("div", "row");
      row.dataset.name = t.name;
      var locked = !!LOCKED[t.name];
      if (locked) row.classList.add("locked");
      if (isChanged(t)) row.classList.add("changed");

      var label = el("div", "label");
      var name = el("span", "name", t.label || t.name);
      if (locked) { var lt = el("span", "lock-tag", "🔒 잠김"); name.appendChild(lt); }
      var tok = el("span", "token", t.name);
      label.appendChild(name);
      label.appendChild(tok);
      row.appendChild(label);

      if (locked) {
        // 잠긴 항목: 값만 보여주고 편집 불가
        row.appendChild(el("div", "lock-val", t.value));
        return row;
      }

      if (t.type === "size") {
        var line = el("div", "slider-line");
        var range = document.createElement("input");
        range.type = "range";
        range.min = "0.6"; range.max = "1.6"; range.step = "0.01";
        range.value = String(indivF(t));
        var read = el("span", "readout", pct(effF(t)));
        sizeReadouts[t.name] = read;
        range.addEventListener("input", function () {
          setEdit(t, { factor: parseFloat(range.value) });
          read.textContent = pct(effF(t));
          markChanged(row, t);
        });
        var reset = el("button", "reset-btn", "↺");
        reset.type = "button";
        reset.title = "이 항목만 기본값으로";
        reset.addEventListener("click", function () {
          if (edits[t.name]) { delete edits[t.name]; saveEdits(); }
          range.value = "1";
          read.textContent = pct(effF(t));
          markChanged(row, t);
          applyLive();
        });
        line.appendChild(range);
        line.appendChild(read);
        line.appendChild(reset);
        row.appendChild(line);
      } else if (t.type === "color") {
        var cl = el("div", "color-line");
        var col = document.createElement("input");
        col.type = "color";
        col.value = normHex(currentValue(t));
        var val = el("span", "swatch-val", currentValue(t));
        col.addEventListener("input", function () {
          val.textContent = col.value;
          setEdit(t, { hex: col.value });
          markChanged(row, t);
        });
        cl.appendChild(col);
        cl.appendChild(val);
        row.appendChild(cl);
      } else {
        var txt = document.createElement("input");
        txt.type = "text";
        txt.value = currentValue(t);
        txt.addEventListener("input", function () {
          setEdit(t, { text: txt.value });
          markChanged(row, t);
        });
        row.appendChild(txt);
      }
      return row;
    }

    function pct(f) {
      var p = Math.round(parseFloat(f) * 100);
      return (p === 100 ? "기본" : (p > 100 ? "+" : "") + (p - 100) + "%");
    }
    function normHex(v) {
      v = (v || "").trim();
      return /^#[0-9a-fA-F]{6}$/.test(v) ? v : (/^#[0-9a-fA-F]{3}$/.test(v)
        ? "#" + v.slice(1).split("").map(function (c) { return c + c; }).join("")
        : "#000000");
    }

    function setEdit(t, patch) {
      edits[t.name] = Object.assign({}, edits[t.name], patch);
      saveEdits();
      applyLive();
    }
    function markChanged(row, t) {
      if (isChanged(t)) row.classList.add("changed");
      else row.classList.remove("changed");
    }

    // ---- live preview injection ----
    function buildOverrideCss() {
      var decls = [];
      tokens.forEach(function (t) {
        if (isChanged(t)) decls.push("  " + t.name + ": " + currentValue(t) + ";");
      });
      if (!decls.length) return "";
      return ":root{\n" + decls.join("\n") + "\n}";
    }
    function applyLive() {
      var frame = $("preview");
      var doc = frame.contentDocument;
      if (!doc) return;
      var style = doc.getElementById("__mid_theme_override");
      if (!style) {
        style = doc.createElement("style");
        style.id = "__mid_theme_override";
        (doc.head || doc.documentElement).appendChild(style);
      }
      style.textContent = buildOverrideCss();
    }

    // ---- export ----
    function buildExport() {
      var out = rawText;
      tokens.forEach(function (t) {
        if (!isChanged(t)) return;
        var re = new RegExp("(" + t.name.replace(/[-]/g, "\\-") + "\\s*:\\s*)[^;]+");
        out = out.replace(re, "$1" + currentValue(t).replace(/\$/g, "$$$$"));
      });
      return out;
    }

    // ---- toast ----
    var toastTimer;
    function toast(msg) {
      var t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { t.classList.remove("show"); }, 1800);
    }

    // ---- wire top bar ----
    $("btn-export").addEventListener("click", function () {
      $("export-text").value = buildExport();
      $("modal-back").classList.add("open");
    });
    $("btn-close").addEventListener("click", function () { $("modal-back").classList.remove("open"); });
    $("modal-back").addEventListener("click", function (e) {
      if (e.target === $("modal-back")) $("modal-back").classList.remove("open");
    });
    $("btn-copy").addEventListener("click", function () {
      var ta = $("export-text");
      ta.select();
      var ok = false;
      try { ok = document.execCommand("copy"); } catch (e) {}
      if (navigator.clipboard) { navigator.clipboard.writeText(ta.value).then(function () {}, function () {}); ok = true; }
      toast(ok ? "복사됐습니다 — theme.css 에 붙여넣기" : "복사 실패 — 직접 선택해 복사하세요");
    });
    $("btn-download").addEventListener("click", function () {
      var blob = new Blob([$("export-text").value], { type: "text/css" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "theme.css";
      a.click();
      setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
    });
    $("btn-reset").addEventListener("click", function () {
      if (!confirm("모든 조정을 되돌리고 기본값으로 초기화할까요?")) return;
      edits = {};
      masters = {};
      saveEdits();
      saveMasters();
      buildControls();
      applyLive();
      toast("기본값으로 초기화했습니다");
    });

    // ---- page selector ----
    var pageSel = $("page-select");
    var savedPage = localStorage.getItem(LS_PAGE);
    if (savedPage) {
      for (var i = 0; i < pageSel.options.length; i++) {
        if (pageSel.options[i].value === savedPage) { pageSel.selectedIndex = i; break; }
      }
      $("preview").src = savedPage;
    }
    pageSel.addEventListener("change", function () {
      localStorage.setItem(LS_PAGE, pageSel.value);
      $("preview").src = pageSel.value;
    });

    // ---- 미리보기 실제 폭 반영(스케일) ----
    // 글씨 크기가 clamp(..vw..)라 화면 폭에 따라 달라진다. iframe을 "실제 화면 폭"으로
    // 렌더한 뒤 패널 크기에 맞춰 축소해, 미리보기 비율이 실제와 같아지게 한다.
    var LS_WIDTH = "mid-theme-preview-w";
    var LOGICAL = localStorage.getItem(LS_WIDTH) || "auto";   // "auto" = 내 화면 폭 기준
    function logicalPx() {
      if (LOGICAL === "auto") {
        return Math.max(360, Math.round(window.screen && window.screen.availWidth || window.innerWidth || 1440));
      }
      return parseInt(LOGICAL, 10) || 1440;
    }
    function fitPreview() {
      var wrap = document.querySelector(".preview-frame-wrap");
      var frame = $("preview");
      if (!wrap || !frame) return;
      var w = wrap.clientWidth, h = wrap.clientHeight;
      if (!w || !h) return;
      var L = logicalPx();
      var scale = Math.min(1, w / L);
      var sw = L * scale;
      frame.style.width = L + "px";
      frame.style.height = (h / scale) + "px";
      frame.style.transform = "scale(" + scale + ")";
      frame.style.left = Math.max(0, (w - sw) / 2) + "px";
      var note = $("scale-note");
      if (note) {
        var prefix = (LOGICAL === "auto" ? "내 화면 " + L + "px" : L + "px 화면");
        note.textContent = scale >= 0.999 ? (prefix + " · 실제 크기") : (prefix + " · " + Math.round(scale * 100) + "%");
      }
    }
    var widthSel = $("width-select");
    if (widthSel) {
      widthSel.value = LOGICAL;
      widthSel.addEventListener("change", function () {
        LOGICAL = widthSel.value;
        localStorage.setItem(LS_WIDTH, LOGICAL);
        fitPreview();
      });
    }
    window.addEventListener("resize", fitPreview);
    // pane이 실제 크기를 갖는 순간(초기 레이아웃 포함) 자동으로 맞춘다 — 0폭 레이스 방지
    if (window.ResizeObserver) {
      new ResizeObserver(fitPreview).observe(document.querySelector(".preview-frame-wrap"));
    }
    $("preview").addEventListener("load", function () { applyLive(); fitPreview(); });

    // ---- init ----
    fetch(THEME_URL, { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("theme.css load failed: " + r.status); return r.text(); })
      .then(function (text) {
        rawText = text;
        parseTheme(text);
        buildControls();
        applyLive();
        fitPreview();
      })
      .catch(function (err) {
        $("controls").innerHTML = "";
        var e = el("div", "empty", "theme.css 를 불러오지 못했습니다. 로컬 서버로 이 페이지를 열었는지 확인하세요.\n(" + err.message + ")");
        $("controls").appendChild(e);
      });
  })();
  </script>
</body>
</html>
